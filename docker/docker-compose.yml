version: '3.8'

services:
  nginx:
    image: nginx:1.15.11
    container_name: aichat_pro_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ..:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: aichat_pro_php
    restart: unless-stopped
    volumes:
      - ..:/var/www/html
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-aichat_pro}
      DB_USER: ${DB_USER:-aichat}
      DB_PASS: ${DB_PASS:-aichat_secret_password}
      DB_CHARSET: ${DB_CHARSET:-utf8mb4}

  db:
    image: mysql:5.7.26
    container_name: aichat_pro_db
    restart: unless-stopped
    ports:
      - "3306:3306"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_secret_password}
      MYSQL_DATABASE: ${DB_NAME:-aichat_pro}
      MYSQL_USER: ${DB_USER:-aichat}
      MYSQL_PASSWORD: ${DB_PASS:-aichat_secret_password}
    volumes:
      - db_data:/var/lib/mysql
      - ../sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

volumes:
  db_data:
