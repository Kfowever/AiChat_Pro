server {
    listen 80;
    server_name localhost;
    root /path/to/AiChat_Pro;
    index index.php;

    client_max_body_size 20M;
    server_tokens off;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location ^~ /assets/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ^~ /uploads/avatars/ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    location ^~ /uploads/files/ {
        deny all;
    }

    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* ^/(config|sql|storage|docker|\.trae|vendor|node_modules)/ {
        deny all;
    }

    location = /install/api.php {
        deny all;
    }

    location / {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php7.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /path/to/AiChat_Pro/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param HTTP_AUTHORIZATION $http_authorization;
        fastcgi_read_timeout 120;
        fastcgi_buffering off;
        gzip off;
    }
}
